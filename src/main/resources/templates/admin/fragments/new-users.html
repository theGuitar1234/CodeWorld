<div th:fragment="new-users" style="display: contents;">
  <div class="title header">
    <h3 th:text="#{admin.newUsers.title}">New Users</h3>
  </div>

  <div class="wrapper new-users">
    <ul th:if="${#lists.isEmpty(latestUsers)}">
      <li th:text="#{admin.newUsers.empty}">No new users this month...</li>
    </ul>

    <ul th:if="${!#lists.isEmpty(latestUsers)}">
      <li th:each="user : ${latestUsers}">
        <img
          th:src="@{${user != null ? user.profilePhoto : '/assets/sprites/profile-thumb.jpg'}}"
          th:alt="#{admin.newUsers.photoAlt}"
          alt="User profile photo"
        />
        <div class="title" th:text="${user.email}">Email</div>

        <small th:text="${user.createdAt}">xx-xx-xxxx</small>
      </li>
    </ul>
  </div>
</div>
