<div class="activity" th:fragment="teacher-transactions">
  <div class="title">
    <h1 th:text="#{admin.teacherTransactions.title}">Teacher Pay Dues</h1>
  </div>
  <div class="panel">

    <div
      th:replace="~{admin/fragments/tables/transaction-dialog.html :: transaction-dialog}"
    ></div>

    <table dialog-table>
      <thead>
        <tr>
          <th th:text="#{transactions.date}">Date</th>
          <th class="description" th:text="#{transactions.description}">Description</th>
          <th th:text="#{transactions.status}">Status</th>
          <th th:text="#{transactions.amount}">Amount</th>
        </tr>
      </thead>

      <tbody
        th:if="${spa == 'TEACHERS'}"
        th:replace="~{admin/fragments/tables/transaction-pagination.html :: tableBody(${transactionsOnPage})}"
      ></tbody>

      <tbody
        th:if="${spa == 'HOME'}"
        th:replace="~{admin/fragments/tables/transaction-pagination.html :: tableBody(${teacherTransactions})}"
      ></tbody>

    </table>

  </div>
  <div id="pagination-container">
    <div
      th:replace="~{admin/fragments/tables/transaction-pagination.html :: view-all-teachers}"
    ></div>
    <nav
      th:replace="~{admin/fragments/tables/transaction-pagination.html :: pagination('/admin/teacherTransactions')}"
    ></nav>
  </div>
</div>
