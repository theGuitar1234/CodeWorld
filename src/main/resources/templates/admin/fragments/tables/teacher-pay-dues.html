<div class="activity" th:fragment="teacher-pay-dues">
  <div class="title">
    <h1 th:text="#{admin.teacherPayDues.title}">Teachers pay dues</h1>
  </div>
  <div class="panel">

    <table>
      <thead>
        <tr>
          <th th:text="#{admin.table.id}">ID</th>
          <th class="description" th:text="#{admin.teachers.fullName}">Full name</th>
          <th th:text="#{admin.teacherPayDues.amount}">Pay due amount</th>
          <th th:text="#{admin.teacherPayDues.dueDate}">Pay due date</th>
          <th></th>
        </tr>
      </thead>
    
      <tbody
        th:replace="~{admin/fragments/tables/entity-pagination.html :: payableTableBody(${payableTeachersOnPage})}"
      ></tbody>

    </table>
  </div>
  <div id="pagination-container">
    <nav
      th:replace="~{admin/fragments/tables/entity-pagination.html :: pagination('/admin/teachers', ${payableTeachersOnPage}, ${pagesForPayableTeachers}, 'payablePageIndex')}"
    ></nav>
  </div>
</div>
