<div class="activity" th:fragment="teacher-pay-over-dues">
  <div class="title">
    <h1 th:text="#{admin.teacherPayOverDues.title}">Teachers pay over dues</h1>
  </div>
  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th class="description">Full name</th>
          <th>Amount</th>
          <th>Due date</th>
          <th>CreatedAt</th>
          <th>PaidAt</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr
          th:if="${paymentOverDues == null || #lists.isEmpty(paymentOverDues)}"
        >
          <td colspan="8">No Teacher Pay Overdues yet.</td>
        </tr>

        <tr th:each="p : ${paymentOverDues}">
          <td th:text="${p.id}"></td>
          <td th:text="${p.fullName}"></td>
          <td th:text="${p.amount}"></td>
          <td th:text="${p.dueDate}"></td>
          <td th:text="${p.createdAt}"></td>
          <td th:text="${p.paidAt}"></td>
          <td th:text="${p.status}"></td>

          <td>
            <form
              th:if="${p.status == 'DUE'}"
              th:action="@{/admin/teachers/paymentOverDue/{id}/pay(id=${p.id})}"
              method="POST"
              data-spa-form
              style="display: flex; gap: 8px; align-items: center"
            >
              <input
                type="hidden"
                th:name="${_csrf.parameterName}"
                th:value="${_csrf.token}"
              />
              <input type="hidden" name="fragment" value="true" />

              <input name="paidBy" value="CASH" style="width: 90px" />
              <input
                name="fee"
                type="number"
                value="0"
                step="0.01"
                style="width: 70px"
              />

              <button type="submit">Mark Paid</button>
            </form>

            <span th:if="${p.status != 'DUE'}">-</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div id="pagination-container">
    <nav
      th:replace="~{admin/fragments/tables/entity-pagination.html :: pagination('/admin/teachers', ${payableTeachersOnPage}, ${pagesForPayableTeachers}, 'payablePageIndex')}"
    ></nav>
  </div>
</div>
