<div class="activity" th:fragment="student-payments">
  <div class="title">
    <h1 th:text="#{admin.studentPayments.title}">Students That Needs to Pay</h1>
  </div>
  <div class="panel">

    <table>
      <thead>
        <tr>
          <th th:text="#{admin.table.id}">ID</th>
          <th class="description" th:text="#{admin.students.fullName}">Full name</th>
          <th th:text="#{admin.studentPayments.amount}">Payment Amount</th>
          <th th:text="#{admin.studentPayments.date}">Payment Date</th>
          <th></th>
        </tr>
      </thead>
    
      <tbody
        th:replace="~{admin/fragments/tables/entity-pagination.html :: payableTableBody(${payableStudentsOnPage})}"
      ></tbody>

    </table>
  </div>
  <div id="pagination-container">
    <nav
      th:replace="~{admin/fragments/tables/entity-pagination.html :: pagination('/admin/students', ${payableStudentsOnPage}, ${pagesForPayableStudents}, 'payablePageIndex')}"
    ></nav>
  </div>
</div>
