<header th:fragment="header(active)" id="header">
  <div class="logo" title="Website Logo" th:title="#{header.logo.title}">
    <a th:href="@{/}">
      <div class="icon"></div>
      <span>Code</span> World
    </a>
  </div>
  <input type="checkbox" id="collapse" />
  <nav>
    <ul>
      <li 
        sec:authorize="!hasRole('ADMIN') and isAuthenticated()"
        th:class="${active == 'DASHBOARD' ? 'active' : ''}"
      >
        <a th:href="@{/user/dashboard}" th:text="#{header.nav.dashboard}">DASHBOARD</a>
      </li>
      <li
        th:class="${active == 'ACCOUNT' ? 'active' : ''}" 
        sec:authorize="isAuthenticated()"
      >
        <a th:href="@{/account/}" th:text="#{header.nav.account}">ACCOUNT</a>
      </li>
      <li
        th:class="${active == 'STUDENTS' ? 'active' : ''}" 
        sec:authorize="hasRole('TEACHER') and !hasRole('ADMIN')"
      >
        <a th:href="@{/students/}" th:text="#{header.nav.students}">STUDENTS</a>
      </li>
      <li><a th:href="@{/user/login}" th:text="#{header.nav.login}">LOGIN</a></li>
      <li sec:authorize="isAuthenticated()">
        <a th:href="@{/user/logout}" th:text="#{header.nav.logout}">LOGOUT</a>
      </li>
      <!-- <li sec:authorize="!hasRole('ADMIN')">
        <a th:href="@{/transactions}">TRANSACTIONS</a>
      </li> -->
      <li sec:authorize="hasAuthority('ACCESS_ADMIN_PANEL')">
        <a th:href="@{/admin/}" th:text="#{header.nav.admin}">ADMIN</a>
      </li>
    </ul>
  </nav>
  <div class="mores">
    <div th:replace="fragments/i18n.html :: i18n"></div>
    <div class="theme">
      <input id="theme" type="checkbox" />
      <label class="icon" for="theme" id="light-mode">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#e8eaed"
        >
          <path
            d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z"
          />
        </svg>
      </label>
      <label class="icon" for="theme" id="dark-mode">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="24px"
          viewBox="0 -960 960 960"
          width="24px"
          fill="#e8eaed"
        >
          <path
            d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"
          />
        </svg>
      </label>
    </div>
    <div th:replace="~{fragments/expandables.html :: notifications}"></div>
    <div th:replace="~{fragments/expandables.html :: profile}"></div>
    <div th:replace="~{fragments/collapsable.html :: collapse-menu}"></div>
  </div>
</header>
